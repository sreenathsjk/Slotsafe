<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlotSafe — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black:#0a0a0a; --card:#141414; --border:#222; --border-l:#2a2a2a;
    --green:#00e87a; --green-dim:rgba(0,232,122,.1); --green-mid:rgba(0,232,122,.3);
    --white:#f5f5f0; --muted:#888; --danger:#ff4d4d;
    --wa:#25D366;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(0,232,122,.08),transparent 65%);pointer-events:none}
  .grid-bg{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:50px 50px;opacity:.25;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent)}

  .card{background:var(--card);border:1px solid var(--border-l);border-radius:24px;padding:48px;width:100%;max-width:440px;position:relative;z-index:2;animation:fadeUp .5s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  .logo{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--white);text-decoration:none;margin-bottom:36px}
  .logo-icon{width:34px;height:34px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .logo-icon svg{width:18px;height:18px;stroke:#0a0a0a;stroke-width:2.5;fill:none;stroke-linecap:round}

  .tabs{display:flex;gap:0;background:var(--black);border:1px solid var(--border);border-radius:100px;padding:4px;margin-bottom:32px}
  .tab{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;border-radius:100px;cursor:pointer;transition:all .2s}
  .tab.active{background:var(--green);color:var(--black);font-weight:600}

  .form-group{margin-bottom:20px}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:500}
  input{width:100%;background:var(--black);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--white);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
  input:focus{border-color:var(--green)}
  input::placeholder{color:#444}

  .btn-submit{width:100%;background:var(--green);color:var(--black);border:none;border-radius:100px;padding:15px;font-size:16px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .25s;margin-top:8px}
  .btn-submit:hover{background:#00ff88;transform:translateY(-1px);box-shadow:0 8px 28px rgba(0,232,122,.3)}
  .btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

  .divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:var(--muted);font-size:13px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

  .btn-google{width:100%;background:transparent;border:1px solid var(--border-l);border-radius:100px;padding:14px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
  .btn-google:hover{border-color:var(--border);background:#1a1a1a}
  .btn-google img{width:18px;height:18px}

  .error-msg{background:rgba(255,77,77,.08);border:1px solid rgba(255,77,77,.25);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--danger);margin-bottom:16px;display:none}
  .success-msg{background:var(--green-dim);border:1px solid var(--green-mid);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--green);margin-bottom:16px;display:none}

  .footer-note{text-align:center;font-size:13px;color:var(--muted);margin-top:24px}
  .footer-note a{color:var(--green);text-decoration:none}

  .spinner{width:18px;height:18px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .business-name-field{display:none}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="card">
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    SlotSafe
  </a>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab" onclick="switchTab('signup')">Create Account</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <div class="form-group business-name-field" id="businessNameField">
    <label>Business / Salon Name</label>
    <input type="text" id="businessName" placeholder="e.g. Glamour Studio, Bandra">
  </div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="emailInput" placeholder="you@example.com">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="passwordInput" placeholder="••••••••">
  </div>

  <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">
    Sign In
  </button>

  <div class="divider">or</div>

  <button class="btn-google" onclick="handleGoogle()">
    <img src="https://www.google.com/favicon.ico" alt="Google">
    Continue with Google
  </button>

  <p class="footer-note">
    By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
  </p>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
           GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const FIREBASE_CONFIG = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };

  const app  = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // If already logged in → redirect
  onAuthStateChanged(auth, async user => {
    if (user) {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists() && snap.data().role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    }
  });

  let currentTab = 'login';

  window.switchTab = (tab) => {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1));
    });
    document.getElementById('submitBtn').textContent = tab === 'login' ? 'Sign In' : 'Create Account';
    const bnf = document.getElementById('businessNameField');
    bnf.style.display = tab === 'signup' ? 'block' : 'none';
    clearMessages();
  };

  window.handleSubmit = async () => {
    const email    = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const bizName  = document.getElementById('businessName').value.trim();
    if (!email || !password) return showError('Please fill in all fields.');
    if (currentTab === 'signup' && !bizName) return showError('Please enter your business name.');

    setLoading(true);
    try {
      if (currentTab === 'login') {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        await redirectUser(cred.user);
      } else {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await saveNewUser(cred.user, bizName, email);
        showSuccess('Account created! Redirecting…');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      }
    } catch (e) {
      showError(friendlyError(e.code));
    } finally {
      setLoading(false);
    }
  };

  window.handleGoogle = async () => {
    setLoading(true);
    try {
      const provider = new GoogleAuthProvider();
      const cred = await signInWithPopup(auth, provider);
      const snap = await getDoc(doc(db, 'users', cred.user.uid));
      if (!snap.exists()) {
        await saveNewUser(cred.user, cred.user.displayName || 'My Business', cred.user.email);
      }
      await redirectUser(cred.user);
    } catch (e) {
      showError(friendlyError(e.code));
    } finally {
      setLoading(false);
    }
  };

  async function redirectUser(user) {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists() && snap.data().role === 'admin') {
      window.location.href = 'admin.html';
    } else {
      window.location.href = 'dashboard.html';
    }
  }

  async function saveNewUser(user, bizName, email) {
    await setDoc(doc(db, 'users', user.uid), {
      uid: user.uid, email, businessName: bizName,
      plan: 'trial', role: 'user',
      trialStart: serverTimestamp(), createdAt: serverTimestamp()
    });
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }
  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }
  function clearMessages() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }
  function setLoading(on) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = on;
    btn.innerHTML = on
      ? `<span class="spinner"></span> Please wait…`
      : (currentTab === 'login' ? 'Sign In' : 'Create Account');
  }
  function friendlyError(code) {
    const map = {
      'auth/user-not-found':'No account found with this email.',
      'auth/wrong-password':'Incorrect password. Try again.',
      'auth/email-already-in-use':'An account with this email already exists.',
      'auth/weak-password':'Password must be at least 6 characters.',
      'auth/invalid-email':'Please enter a valid email address.',
      'auth/popup-closed-by-user':'Google sign-in was cancelled.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }
</script>
</body>
</html>
